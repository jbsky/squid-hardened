# =====================================================================
#  squid.conf -- Multi-mode VyOS production
#
#  2 modes simultanes sur ports differents :
#    Port 3128 : Proxy explicite (clients configures manuellement/WPAD)
#    Port 3130 : Proxy explicite + SSL Bump (clients opt-in, HTTPS dechiffre)
#
#  NOTE : Le mode transparent (intercept) n'est PAS supporte dans un
#  container NAT (podman/docker bridge). getsockopt(SO_ORIGINAL_DST)
#  echoue car le conntrack est dans le namespace de l'hote, pas du
#  container. Utiliser WPAD/DHCP pour auto-configurer les clients.
#
#  ICAP / ClamAV actif sur les 2 modes (bypass=1 si ICAP down).
#
#  Pre-requis SSL Bump (port 3130) :
#    /etc/squid/ssl_cert/bump.pem     → cle + cert combines
#    /etc/squid/ssl_cert/dhparam.pem  → parametres DH
#    /etc/squid/conf.d/nobump_domains.acl → domaines exclus du bump
#    Generer via : scripts/generate-ca.sh
#    Distribuer bump.crt sur les clients qui utilisent le port 3130.
# =====================================================================

visible_hostname webproxy

# ==================== Ports d'ecoute ====================

# Mode 1 : Proxy explicite classique (pas de bump)
# Clients configurent leur proxy sur <squid_ip>:3128
# Ou auto-configuration via WPAD/DHCP option 252.
http_port 3128 tcpkeepalive=60,30,3

# Mode 2 : Proxy explicite + SSL Bump (clients opt-in)
# Les clients configurent leur proxy sur <squid_ip>:3130
# Tout le HTTPS est dechiffre sauf les domaines dans nobump_domains.acl
http_port 3130 ssl-bump \
    cert=/etc/squid/ssl_cert/bump.pem \
    generate-host-certificates=on \
    dynamic_cert_mem_cache_size=16MB \
    tls-dh=/etc/squid/ssl_cert/dhparam.pem \
    options=NO_SSLv3,NO_TLSv1,NO_TLSv1_1 \
    cipher=HIGH:MEDIUM:!aNULL:!eNULL:!RC4:!MD5:!DES:!3DES:!SHA1

# ==================== SSL Bump (port 3130 uniquement) ====================

# Generateur de certificats forges
# Note: /var/lib/ssl_db/db (subdir) car certgen -c doit CREER le dossier
# et le mount point /var/lib/ssl_db existe deja (volume podman/docker)
sslcrtd_program /usr/lib/squid/security_file_certgen -s /var/lib/ssl_db/db -M 20MB
sslcrtd_children 8 startup=2 idle=1

# Accepter les chaines incompletes (sites mal configures)
sslproxy_cert_error allow all

acl step1 at_step SslBump1
acl step2 at_step SslBump2
acl step3 at_step SslBump3

# Domaines exclus du bump (banques, sante, cert pinning)
acl nobump_dst ssl::server_name_regex -i "/etc/squid/conf.d/nobump_domains.acl"

# Etape 1 : peek pour recuperer le SNI
ssl_bump peek step1 all
# Etape 2 : splice si dans la liste d'exclusion
ssl_bump splice step2 nobump_dst
# Etape 3 : bump tout le reste
ssl_bump bump step3 all
ssl_bump bump all

# ==================== DNS ====================

dns_nameservers 1.1.1.1 8.8.8.8 9.9.9.9

# ==================== ACLs reseau ====================

# Subnets autorises — ADAPTER a votre topologie
# Par defaut : tous les reseaux prives RFC1918
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16

# Ports
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 21
acl Safe_ports port 443
acl Safe_ports port 70
acl Safe_ports port 210
acl Safe_ports port 1025-65535
acl Safe_ports port 280
acl Safe_ports port 488
acl Safe_ports port 591
acl Safe_ports port 777

acl CONNECT method CONNECT

# ==================== Regles d'acces ====================

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow localhost manager
http_access deny manager
http_access allow localnet
http_access allow localhost
http_access deny all

# ==================== ICAP / ClamAV ====================

icap_enable on
icap_send_client_ip on
icap_send_client_username on
icap_client_username_header X-Authenticated-User
icap_preview_enable on
icap_preview_size 1024
icap_service_failure_limit -1

# Analyse des requetes (URLs, uploads)
# ADAPTER : IP du container c-icap. Utiliser l'IP directe si aardvark-dns
# ne fonctionne pas (cas VyOS podman), sinon utiliser le hostname c-icap.
icap_service service_req reqmod_precache bypass=1 icap://c-icap:1344/squidclamav
adaptation_access service_req allow all

# Analyse des reponses (telechargements)
icap_service service_resp respmod_precache bypass=1 icap://c-icap:1344/squidclamav
adaptation_access service_resp allow all

# ==================== Cache ====================

# Pas de cache disque (comme en production)
cache deny all

# ==================== Logs ====================

# Format enrichi avec info SSL (champs vides = "-" si pas de bump)
logformat squid_multi %ts.%03tu %6tr %>a %Ss/%03>Hs %<st %rm %ru %[un %Sh/%<a %mt %ssl::>sni %ssl::bump_mode

# Syslog distant (optionnel — ADAPTER l'IP de votre serveur syslog)
# access_log udp://192.168.99.20:514 squid_multi
# Fichier local
access_log stdio:/var/log/squid/access.log squid_multi
cache_log stdio:/var/log/squid/cache.log

# ==================== Securite ====================

httpd_suppress_version_string on
forwarded_for on
via on

request_header_max_size 64 KB
reply_header_max_size 64 KB
client_request_buffer_max_size 512 KB

# Inclusion drop-in
include /etc/squid/conf.d/*.conf
