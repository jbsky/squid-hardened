# =====================================================================
#  squid.conf – Mode EXPLICITE
#  - Clients configurés explicitement (PAC/WPAD ou IP:3128)
#  - SSL Bump (peek/splice/bump) avec dump TLS pour inspection
#  - ICAP request + response vers C-ICAP/ClamAV
# =====================================================================

# -------------------- Identité --------------------
visible_hostname proxy-explicit.local
unique_hostname  proxy-explicit-01

# -------------------- Ports -----------------------
# Port HTTP classique (clients explicites)
http_port 3128 \
    tcpkeepalive=60,30,3

# Port HTTPS pour intercepter le CONNECT et faire le bump
# Notez : pas "intercept" ici (mode explicite), juste "ssl-bump"
http_port 3129 ssl-bump \
    cert=/etc/squid/ssl_cert/bump.pem \
    generate-host-certificates=on \
    dynamic_cert_mem_cache_size=16MB \
    tls-dh=/etc/squid/ssl_cert/dhparam.pem \
    options=NO_SSLv3,NO_TLSv1,NO_TLSv1_1 \
    cipher=HIGH:MEDIUM:!aNULL:!eNULL:!RC4:!MD5:!DES:!3DES:!SHA1

# -------------------- SSL Bump --------------------
# Programme générateur de certificats forgés
sslcrtd_program /usr/lib/squid/security_file_certgen -s /var/lib/ssl_db/db -M 20MB
sslcrtd_children 8 startup=2 idle=1

# Validateur (autorise les chaînes incomplètes, ajuster selon besoin)
sslproxy_cert_error allow all

# ACL pour bump
acl step1 at_step SslBump1
acl step2 at_step SslBump2
acl step3 at_step SslBump3

# Sites qu'on NE bumpe PAS (banques, santé, etc.) → splice = pass-through
acl nobump_dst ssl::server_name_regex -i "/etc/squid/conf.d/nobump_domains.acl"

# Étape 1 : peek pour récupérer le SNI
ssl_bump peek step1 all
# Étape 2 : splice si dans la liste blanche
ssl_bump splice step2 nobump_dst
# Étape 3 : bump (déchiffrement complet + analyse) sinon
ssl_bump bump  step3 all
ssl_bump bump  all

# -------------------- ACLs réseau -----------------
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16
acl localnet src fc00::/7
acl localnet src fe80::/10

acl SSL_ports port 443
acl Safe_ports port 80 21 443 70 210 1025-65535 280 488 591 777
acl CONNECT method CONNECT

http_access deny  !Safe_ports
http_access deny  CONNECT !SSL_ports
http_access allow localhost manager
http_access deny  manager
http_access allow localnet
http_access allow localhost
http_access deny  all

# -------------------- ICAP / ClamAV ---------------
icap_enable on
icap_send_client_ip on
icap_send_client_username on
icap_client_username_header X-Authenticated-User
icap_preview_enable on
icap_preview_size 1024
icap_service_failure_limit -1

# Service REQMOD (filtrage requêtes – URL blocklists côté c-icap si voulu)
icap_service service_req reqmod_precache bypass=1 icap://c-icap:1344/squidclamav
adaptation_access service_req allow all

# Service RESPMOD (analyse antivirale des réponses)
icap_service service_resp respmod_precache bypass=1 icap://c-icap:1344/squidclamav
adaptation_access service_resp allow all

# -------------------- Cache & logs ----------------
cache_dir rock /var/spool/squid 4096 max-size=1048576
maximum_object_size 1024 MB
cache_mem 512 MB
maximum_object_size_in_memory 1 MB

# Format de log enrichi (utile pour SOC / SIEM)
logformat squid_ssl %ts.%03tu %6tr %>a %Ss/%03>Hs %<st %rm %ru %[un %Sh/%<a %mt %ssl::>sni %ssl::bump_mode
access_log stdio:/var/log/squid/access.log squid_ssl
cache_log /var/log/squid/cache.log

# Rotation native gérée par logrotate sur l'hôte ou par stdout/stderr
# (préfère stdout pour aggrégation k8s/docker)
#access_log stdio:/dev/stdout squid_ssl
#cache_log  stdio:/dev/stderr

# -------------------- Sécurité --------------------
# Ne pas révéler la version
httpd_suppress_version_string on
forwarded_for delete
via off

# DNS
dns_nameservers 1.1.1.1 9.9.9.9

# Limites raisonnables (anti-DoS basique)
request_header_max_size 64 KB
reply_header_max_size 64 KB
client_request_buffer_max_size 512 KB

# Inclusion fichiers additionnels
include /etc/squid/conf.d/*.conf
