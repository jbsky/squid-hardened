# =====================================================================
#  squid.conf – Mode TRANSPARENT
#  - Trafic HTTP redirigé par VyOS (NAT REDIRECT/DNAT) vers ce proxy
#  - HTTPS = bypass (un proxy transparent ne peut pas bumper sans
#    déployer une CA d'entreprise sur TOUS les clients, ce qui en
#    fait de facto un mode explicite). HTTPS reste en pass-through.
#  - ICAP request + response vers C-ICAP/ClamAV pour analyse HTTP
# =====================================================================

visible_hostname proxy-transparent.local
unique_hostname  proxy-transparent-01

# Port transparent (intercepte le trafic NATé)
http_port 3128 intercept \
    tcpkeepalive=60,30,3

# Port admin/cachemgr non intercepté
http_port 127.0.0.1:3127

# -------------------- ACLs réseau -----------------
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16

acl SSL_ports port 443
acl Safe_ports port 80 21 443 1025-65535
acl CONNECT method CONNECT

http_access deny  !Safe_ports
http_access deny  CONNECT !SSL_ports
http_access allow localhost manager
http_access deny  manager
http_access allow localnet
http_access allow localhost
http_access deny  all

# -------------------- ICAP / ClamAV ---------------
icap_enable on
icap_send_client_ip on
icap_preview_enable on
icap_preview_size 1024
icap_service_failure_limit -1

icap_service service_req reqmod_precache bypass=1 icap://c-icap:1344/squidclamav
adaptation_access service_req allow all

icap_service service_resp respmod_precache bypass=1 icap://c-icap:1344/squidclamav
adaptation_access service_resp allow all

# -------------------- Cache & logs ----------------
cache_dir rock /var/spool/squid 4096 max-size=1048576
maximum_object_size 1024 MB
cache_mem 512 MB
maximum_object_size_in_memory 1 MB

logformat squid_tx %ts.%03tu %6tr %>a %Ss/%03>Hs %<st %rm %ru %[un %Sh/%<a %mt
access_log stdio:/var/log/squid/access.log squid_tx
cache_log  stdio:/var/log/squid/cache.log

# -------------------- Sécurité --------------------
httpd_suppress_version_string on
forwarded_for delete
via off
dns_nameservers 1.1.1.1 9.9.9.9

request_header_max_size 64 KB
reply_header_max_size 64 KB
client_request_buffer_max_size 512 KB

include /etc/squid/conf.d/*.conf
