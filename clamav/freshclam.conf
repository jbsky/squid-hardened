# =====================================================================
#  freshclam.conf – Mise à jour des signatures ClamAV
# =====================================================================

DatabaseDirectory   /var/lib/clamav
UpdateLogFile       /var/log/clamav/freshclam.log
LogFileMaxSize      20M
LogTime             yes
LogVerbose          no
LogRotate           yes
PidFile             /run/clamav/freshclam.pid

DatabaseOwner       clamav

# Sources officielles
DatabaseMirror      database.clamav.net

# Fréquence (toutes les heures, max 24 fois/jour pour respect upstream)
Checks              24

# Bytecode
Bytecode            yes

# Notifier clamd sur mise à jour réussie
NotifyClamd         /etc/clamav/clamd.conf

# Si proxy explicite sur le LAN, décommenter et adapter :
# HTTPProxyServer    proxy-explicit.local
# HTTPProxyPort      3128
# HTTPProxyUsername  clamav
# HTTPProxyPassword  changeme

# Timeouts
ConnectTimeout      30
ReceiveTimeout      60
TestDatabases       yes
ScriptedUpdates     yes
CompressLocalDatabase no

# Limites
MaxAttempts         5
