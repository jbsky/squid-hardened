# syntax=dhi.io/build:2-alpine3.23
# =====================================================================
#  C-ICAP + squidclamav – Docker Hardened Image
#  c-icap et squidclamav ne sont pas dans les dépôts Alpine → compilation
#  depuis les sources dans un stage builds.pipeline avec outils complets.
#  outputs.diff=true = SEULS les fichiers produits par la compilation
#  atterrissent dans l'image finale (≡ COPY --from=builder dans un
#  Dockerfile multi-stage).
#
#  Build :
#    docker buildx build . -f c-icap/c-icap.yaml \
#      --sbom=generator=dhi.io/scout-sbom-indexer:1 \
#      --provenance=1 \
#      --tag ghcr.io/jbsky/c-icap-hardened:latest --push
# =====================================================================

name: c-icap hardened
image: docker.io/jbsky/c-icap-hardened
variant: runtime
tags:
  - "0.5"
  - "0.5.13"
platforms:
  - linux/amd64
  - linux/arm64

contents:
  repositories:
    - http://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - http://dl-cdn.alpinelinux.org/alpine/v3.23/community
  # Dépendances RUNTIME uniquement (pas les -dev, pas les compilateurs)
  packages:
    - openssl
    - libssl3
    - libcrypto3
    - curl
    - libcurl
    - clamav-libs
    - zlib
    - bzip2
    - pcre2
    - ca-certificates-bundle
    - tini
    - tzdata
    - musl

  # ---- Stage de compilation (équivalent du stage builder Dockerfile) -
  builds:
    - name: cicap-compile
      contents:
        repositories:
          - http://dl-cdn.alpinelinux.org/alpine/v3.23/main
          - http://dl-cdn.alpinelinux.org/alpine/v3.23/community
        packages:
          # Chaîne de compilation
          - build-base
          - autoconf
          - automake
          - libtool
          - pkgconf
          # Dépendances de compilation
          - openssl-dev
          - curl-dev
          - clamav-dev
          - zlib-dev
          - bzip2-dev
          - pcre2-dev
          - linux-headers
          # Téléchargement des sources
          - curl
          - ca-certificates
          - tar
      pipeline:
        - name: compile-c-icap
          runs: |
            set -eux -o pipefail
            CICAP_VERSION="0.5.13"
            mkdir -p /src && cd /src

            echo "→ Téléchargement c-icap ${CICAP_VERSION}"
            curl -fsSL \
              "https://sourceforge.net/projects/c-icap/files/c-icap/0.5.x/c_icap-${CICAP_VERSION}.tar.gz/download" \
              -o cicap.tar.gz
            tar -xzf cicap.tar.gz
            mv "c_icap-${CICAP_VERSION}" cicap

            echo "→ Compilation c-icap"
            cd /src/cicap
            CFLAGS="-O2 -fstack-protector-strong -fPIE -D_FORTIFY_SOURCE=2" \
            LDFLAGS="-Wl,-z,relro,-z,now,-z,noexecstack -pie" \
            ./configure \
              --prefix=/usr \
              --sysconfdir=/etc/c-icap \
              --localstatedir=/var \
              --enable-large-files \
              --with-openssl
            make -j"$(nproc)"
            make install

        - name: compile-squidclamav
          runs: |
            set -eux -o pipefail
            SC_VERSION="7.3"
            mkdir -p /src && cd /src

            echo "→ Téléchargement squidclamav ${SC_VERSION}"
            curl -fsSL \
              "https://github.com/darold/squidclamav/archive/refs/tags/v${SC_VERSION}.tar.gz" \
              -o squidclamav.tar.gz
            tar -xzf squidclamav.tar.gz
            mv "squidclamav-${SC_VERSION}" squidclamav

            echo "→ Compilation squidclamav"
            cd /src/squidclamav
            ./configure \
              --prefix=/usr \
              --sysconfdir=/etc/c-icap \
              --with-c-icap=/usr
            make -j"$(nproc)"
            make install

        - name: strip-and-clean
          runs: |
            set -eux
            # Strip des ELF produits
            find /usr/lib/c_icap /usr/sbin/c-icap /usr/bin/c-icap-* \
              -type f 2>/dev/null \
              -exec sh -c 'file "$1" 2>/dev/null | grep -q ELF && strip "$1" 2>/dev/null || true' _ {} \;
            # Création répertoires runtime
            install -d -m 0750 /var/log/c-icap
            install -d -m 0750 /run/c-icap

      # outputs.diff=true : seuls les chemins MODIFIÉS par rapport à
      # l'Alpine nu du stage builder sont copiés dans l'image finale.
      # C'est l'exact équivalent de COPY --from=builder dans un Dockerfile.
      outputs:
        - source: /usr/sbin/c-icap
          target: /usr/sbin/c-icap
          uid: 0
          gid: 0
        - source: /usr/bin/
          target: /usr/bin/
          uid: 0
          gid: 0
          diff: true
        - source: /usr/lib/c_icap/
          target: /usr/lib/c_icap/
          uid: 0
          gid: 0
        - source: /etc/c-icap/
          target: /etc/c-icap/
          uid: 0
          gid: 4100
        - source: /var/log/c-icap
          target: /var/log/c-icap
          uid: 4100
          gid: 4100
        - source: /run/c-icap
          target: /run/c-icap
          uid: 4100
          gid: 4100

  files:
    # c-icap.conf inline
    - path: /etc/c-icap/c-icap.conf
      uid: 0
      gid: 4100
      mode: "0640"
      content: |
        PidFile          /run/c-icap/c-icap.pid
        CommandsSocket   /run/c-icap/c-icap.ctl
        Timeout          300
        KeepAlive        On
        MaxKeepAliveRequests 100
        KeepAliveTimeout 600
        StartServers     3
        MaxServers       10
        MinSpareThreads  10
        MaxSpareThreads  20
        ThreadsPerChild  10
        MaxRequestsPerChild 0
        Port             1344
        ServerAdmin      ops@example.local
        ServerName       cicap.internal
        TmpDir           /tmp
        MaxMemObject     131072
        DebugLevel       1
        ServerLog        /var/log/c-icap/server.log
        AccessLog        /var/log/c-icap/access.log
        LogFormat        "%tl, %>a %im %iu %is"
        RemoteProxyUsers off
        acl SQUID_NET src 172.16.0.0/12
        acl SQUID_NET src 10.0.0.0/8
        acl LOCALHOST src 127.0.0.1
        icap_access allow LOCALHOST
        icap_access allow SQUID_NET
        Service squidclamav squidclamav.so
        ServiceAlias  avscan squidclamav

    # squidclamav.conf inline
    - path: /etc/c-icap/squidclamav.conf
      uid: 0
      gid: 4100
      mode: "0640"
      content: |
        maxsize 5000000
        timeout 1
        redirect http://proxy.local/cgi-bin/clwarn.cgi
        debug 0
        stat off
        logredir off
        clamd_ip clamav
        clamd_port 3310
        abort       \.(ico|gif|png|jpg|jpeg|svg|css|js|woff2?)$
        abortcontent ^image\/.*$
        abortcontent ^text\/css.*$
        abortcontent ^application\/(font|javascript).*$

    # entrypoint inline
    - path: /usr/local/bin/entrypoint.sh
      uid: 0
      gid: 0
      mode: "0755"
      content: |
        #!/bin/sh
        set -eu
        CLAMD_HOST="${CLAMD_HOST:-clamav}"
        CLAMD_PORT="${CLAMD_PORT:-3310}"
        echo "[entrypoint] Attente de clamd (${CLAMD_HOST}:${CLAMD_PORT})..."
        i=0
        while ! nc -z "${CLAMD_HOST}" "${CLAMD_PORT}" 2>/dev/null; do
            i=$((i+1))
            [ $i -gt 120 ] && echo "[entrypoint][ERROR] clamd injoignable" && exit 1
            sleep 1
        done
        echo "[entrypoint] clamd OK, démarrage c-icap"
        exec "$@"

accounts:
  run-as: cicap
  users:
    - name: cicap
      uid: 4100
      gid: 4100
  groups:
    - name: cicap
      gid: 4100
      members:
        - cicap

environment:
  TZ: UTC
  CLAMD_HOST: clamav
  CLAMD_PORT: "3310"

entrypoint:
  - /sbin/tini
  - "--"
  - /usr/local/bin/entrypoint.sh

cmd:
  - c-icap
  - -N
  - -D
  - -f
  - /etc/c-icap/c-icap.conf

ports:
  - 1344/tcp

volumes:
  - /var/log/c-icap

os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.23"
  pretty-name: c-icap Hardened / Alpine Linux v3.23
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://github.com/jbsky/squid-hardened/issues

annotations:
  org.opencontainers.image.description: c-icap 0.5.13 + squidclamav 7.3, compilés depuis les sources, DHI hardened, non-root
  org.opencontainers.image.licenses: LGPL-2.1-or-later
