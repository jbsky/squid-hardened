# =====================================================================
#  squidclamav.conf – Module antivirus ClamAV pour c-icap
# =====================================================================

# Limite de taille (au-delà : bypass pour ne pas tuer les perfs)
maxsize 5000000

# Délai max (secondes). 1s est trop agressif : la moindre latence ICAP fait
# basculer squidclamav en erreur DNS/timeout au lieu de laisser passer la
# réponse d'avertissement (vécu en prod, cf. incident squidclamav.conf).
timeout 3

# Pas de redirection : "proxy.local" n'est volontairement pas résolvable ici
# (aucun vhost de ce nom n'existe), donc une redirection le ciblant cassait
# systématiquement l'affichage de la page d'avertissement antivirus (erreur
# DNS Squid au lieu du blocage attendu). On retombe sur les pages d'erreur
# natives de c-icap.
# redirect http://proxy.local/cgi-bin/clwarn.cgi

# Mode debug (0 = off, 1 = on)
debug 0

# Stat sur les services pour cachemgr
stat off

# Logs
logredir off

# ClamAV est dans un container séparé — connexion TCP uniquement.
# clamd_local n'est PAS utilisé (pas de socket partagé entre containers).
clamd_ip clamav
clamd_port 3310

# Liste des types MIME / extensions / URLs à ignorer (whitelist)
# Format : abort | abortcontent | trustuser | untrusteduser | trustclient | untrustedclient | squidguard
#         keyword regex

# Skip pour Windows Update / Apple software update / Mozilla
abort       \.(ico|gif|png|jpg|jpeg|jp2|jpx|svg|swf|css|js|woff2?|ttf|otf|eot|mp[34]|m4[av])$
abortcontent ^image\/.*$
abortcontent ^text\/css.*$
abortcontent ^application\/(font|javascript|x-javascript).*$

# Trust certains user-agents internes
# trustuser   ^scanner-interne$

# Fichiers TRÈS suspects à toujours scanner (override des abort ci-dessus)
# scan       \.(exe|dll|com|bat|cmd|scr|pif|vbs|js|jar|ps1|msi|hta|chm|cpl|sys|reg)$
# scan       \.(zip|7z|rar|tar|tgz|gz|bz2|cab|iso|img|ace|arj|lha|lzh)$
# scan       \.(doc|docm|docx|xls|xlsm|xlsx|ppt|pptm|pptx|rtf|pdf)$
