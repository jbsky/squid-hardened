# =====================================================================
#  c-icap.conf – Serveur ICAP appelé par Squid
# =====================================================================

PidFile          /run/c-icap/c-icap.pid
CommandsSocket   /run/c-icap/c-icap.ctl
Timeout          300
MaxKeepAliveRequests 100
KeepAliveTimeout 600
StartServers     3
MaxServers       10
MinSpareThreads  10
MaxSpareThreads  20
ThreadsPerChild  10
MaxRequestsPerChild 0
Port             1344

# Pas de TLS sur ICAP interne (le réseau docker est isolé)
# Si réseau hostile, ajouter TLSPort 11344 + cert/key

# User/Group directives removed: container already runs as cicap:cicap
# (USER directive in Dockerfile). Leaving these in causes setgroups() to fail
# because non-root processes cannot call setgroups().

ServerAdmin      ops@internal
ServerName       cicap.internal
TmpDir           /tmp
MaxMemObject     131072

# Logs
DebugLevel       1
ServerLog        /var/log/c-icap/server.log
AccessLog        /var/log/c-icap/access.log

RemoteProxyUsers off

# ACL : qui peut nous parler en ICAP ? Restriction au réseau Squid
acl SQUID_NET src 172.16.0.0/12
acl SQUID_NET src 192.168.0.0/16
acl SQUID_NET src 10.0.0.0/8
acl LOCALHOST src 127.0.0.1
icap_access allow LOCALHOST
icap_access allow SQUID_NET

# Module squidclamav : auto-loads its own config from /etc/c-icap/squidclamav.conf
# Do NOT use Include for squidclamav.conf (c-icap parser fails on squidclamav directives)
Service squidclamav squidclamav.so
