# =====================================================================
#  Audit sécurité hebdomadaire des images publiées
#  - Trivy scan complet (CVE + secrets + misconfigs)
#  - Grype scan (cross-check)
#  - Dive (efficacité couches)
#  - Vérification signature cosign
#  Déclencheur :
#    - hebdomadaire (mardi 03h00 UTC)
#    - manuel
# =====================================================================
name: security-audit

on:
  schedule:
    - cron: '0 3 * * 2'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

permissions:
  contents: read
  security-events: write
  packages: read

jobs:
  audit:
    name: Audit ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [squid-hardened, c-icap-hardened, clamav-hardened]

    steps:
      - uses: actions/checkout@v4

      - name: Trivy full scan (vuln + secret + misconfig)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:latest
          format: 'sarif'
          output: 'trivy-${{ matrix.image }}.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          scanners: 'vuln,secret,misconfig'
          ignore-unfixed: false

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: audit-${{ matrix.image }}

      - name: Trivy summary (text)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:latest
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Grype scan
        run: |
          grype ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:latest \
                --fail-on high --only-fixed || true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify cosign signature
        run: |
          set -e
          cosign verify ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:latest \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --output-file cosign-${{ matrix.image }}.json
          jq -r '.[].optional.Bundle.Payload.body' cosign-${{ matrix.image }}.json | head -c 200

      - name: Verify SBOM attestation
        continue-on-error: true
        run: |
          cosign verify-attestation \
            --type spdxjson \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:latest > attestation.json
          echo "Attestation SBOM vérifiée"

  notify:
    name: Notification si CVE critique
    needs: audit
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Issue automatique
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Sécurité] Audit hebdomadaire en échec - ${today}`,
              body: `L'audit du ${today} a détecté des CVE critiques. Voir l'onglet Security du repo.\n\nLien : ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/security/code-scanning`,
              labels: ['security','automated']
            });
