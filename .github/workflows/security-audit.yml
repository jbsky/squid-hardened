# =====================================================================
#  Audit securite hebdomadaire — Stack Squid (3 images)
#  - Trivy (CVE + secrets + misconfig) sur squid, c-icap, clamav
#  - Grype (cross-check)
#  - Verification signature cosign
# =====================================================================
name: security-audit

on:
  schedule:
    - cron: '0 3 * * 2'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

permissions:
  contents: read
  security-events: write
  packages: read

jobs:
  audit:
    name: Audit ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - squid-hardened
          - c-icap-hardened
          - clamav-hardened
    steps:
      - uses: actions/checkout@v6

      - name: Trivy full scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:latest
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: CRITICAL,HIGH,MEDIUM
          scanners: vuln,secret,misconfig
          ignore-unfixed: false

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: audit-${{ matrix.image }}

      - name: Trivy summary
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:latest
          format: table
          severity: CRITICAL,HIGH

      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Grype scan
        run: |
          grype ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:latest \
                --fail-on high --only-fixed

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify cosign signature
        run: |
          cosign verify ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:latest \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com

  notify:
    name: Notification si echec
    needs: audit
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Issue automatique
        uses: actions/github-script@v9
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security] Weekly audit failed - ${today}`,
              body: `Audit du ${today} a detecte des CVE. Voir Security tab.\n\n${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/security/code-scanning`,
              labels: ['security','automated']
            });
