# =====================================================================
#  Build & Push – deux stratégies selon le contexte :
#
#  1) build-dhi   → Docker Hardened Images (YAML) → ghcr.io (registry)
#       Utilise dhi.io/build:2-alpine3.23 comme frontend BuildKit.
#       Nécessite : DOCKER_USERNAME + DOCKER_TOKEN (secrets GitHub)
#       pour docker login dhi.io.
#
#  2) build-dockerfile → Dockerfiles multi-stage classiques
#       Fallback si DHI indisponible ou pour validation en PR.
#       Pas besoin de docker login dhi.io.
#
#  Architecture multi-arch :
#    - Chaque plateforme (amd64, arm64) est un job séparé en parallèle
#    - Les digests sont uploadés en artifacts
#    - Un job merge crée le manifest multi-arch + signe + scanne
# =====================================================================
name: build-push

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
    paths:
      - 'squid/**'
      - 'c-icap/**'
      - 'clamav/**'
      - 'versions.json'
      - '.github/workflows/build-push.yml'
  pull_request:
    branches: [main]
    paths:
      - 'squid/**'
      - 'c-icap/**'
      - 'clamav/**'
      - 'versions.json'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Target platforms'
        required: false
        default: 'linux/amd64'
        type: choice
        options:
          - 'linux/amd64'
          - 'linux/arm64'
          - 'linux/amd64,linux/arm64'

env:
  REGISTRY: ghcr.io
  NAMESPACE: ${{ github.repository_owner }}

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write
  attestations: write

jobs:
  # -------------------------------------------------------------------
  #  Lint (Hadolint + ShellCheck) – toujours, y compris en PR
  # -------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hadolint – squid/Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: squid/Dockerfile
          failure-threshold: warning

      - name: Hadolint – c-icap/Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: c-icap/Dockerfile
          failure-threshold: warning

      - name: Hadolint – clamav/Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: clamav/Dockerfile
          failure-threshold: warning

      - name: ShellCheck – scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts

  # -------------------------------------------------------------------
  #  Check if DHI credentials are configured
  # -------------------------------------------------------------------
  check-dhi:
    name: Check DHI credentials
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      has-dhi: ${{ steps.check.outputs.has-dhi }}
    steps:
      - id: check
        env:
          DHI_USER: ${{ secrets.DOCKER_USERNAME }}
        run: |
          if [ -n "$DHI_USER" ]; then
            echo "has-dhi=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-dhi=false" >> "$GITHUB_OUTPUT"
          fi

  # -------------------------------------------------------------------
  #  Compute platform matrix from workflow input
  # -------------------------------------------------------------------
  compute-platforms:
    name: Compute platforms
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          PLATFORMS="${{ inputs.platforms || 'linux/amd64' }}"
          # Convert comma-separated string to JSON array
          MATRIX=$(echo "$PLATFORMS" | jq -Rc 'split(",")')
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"

  # -------------------------------------------------------------------
  #  Validation YAML DHI (parse-check avant le vrai build)
  #  Skipped if DHI credentials are not configured
  # -------------------------------------------------------------------
  validate-dhi:
    name: Validate DHI YAML
    runs-on: ubuntu-latest
    needs: check-dhi
    if: needs.check-dhi.outputs.has-dhi == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login dhi.io pour que BuildKit puisse pull le frontend DHI
      - name: Login dhi.io (frontend DHI)
        uses: docker/login-action@v4
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # On lance un build --load sans push pour valider la syntaxe YAML DHI
      # sur une seule plateforme pour aller vite
      - name: Validate clamav.yaml
        run: |
          docker buildx build clamav/ -f clamav/clamav.yaml \
            --platform linux/amd64 \
            --sbom=generator=dhi.io/scout-sbom-indexer:1 \
            --provenance=1 \
            --tag dhi-validate-clamav:ci \
            --load

      - name: Validate squid.yaml
        run: |
          docker buildx build squid/ -f squid/squid.yaml \
            --platform linux/amd64 \
            --sbom=generator=dhi.io/scout-sbom-indexer:1 \
            --provenance=1 \
            --tag dhi-validate-squid:ci \
            --load

      - name: Validate c-icap.yaml
        run: |
          docker buildx build c-icap/ -f c-icap/c-icap.yaml \
            --platform linux/amd64 \
            --sbom=generator=dhi.io/scout-sbom-indexer:1 \
            --provenance=1 \
            --tag dhi-validate-cicap:ci \
            --load

  # -------------------------------------------------------------------
  #  Build + Push DHI → ghcr.io (per-platform, push by digest)
  #  Skipped if DHI credentials are not configured
  # -------------------------------------------------------------------
  build-dhi:
    name: DHI – ${{ matrix.image.name }} (${{ matrix.platform }})
    needs: [check-dhi, validate-dhi, compute-platforms]
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && needs.check-dhi.outputs.has-dhi == 'true'
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: clamav-hardened
            definition: clamav/clamav.yaml
            context: clamav/
            version_key: clamav
          - name: squid-hardened
            definition: squid/squid.yaml
            context: squid/
            version_key: squid
          - name: c-icap-hardened
            definition: c-icap/c-icap.yaml
            context: c-icap/
            version_key: c-icap
        platform: ${{ fromJson(needs.compute-platforms.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.platform != 'linux/amd64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Login dhi.io (frontend DHI)
        uses: docker/login-action@v4
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Login ghcr.io (registry cible)
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push by digest (DHI)
        id: build
        run: |
          docker buildx build ${{ matrix.image.context }} \
            -f ${{ matrix.image.definition }} \
            --platform ${{ matrix.platform }} \
            --sbom=generator=dhi.io/scout-sbom-indexer:1 \
            --provenance=mode=max \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --output "type=image,name=${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }},push-by-digest=true,name-canonical=true,push=true" \
            --cache-from type=gha,scope=${{ matrix.image.name }}-${{ matrix.platform }} \
            --cache-to   type=gha,mode=max,scope=${{ matrix.image.name }}-${{ matrix.platform }} \
            --metadata-file /tmp/meta.json

          DIGEST=$(jq -r '."containerimage.digest"' /tmp/meta.json)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Export digest
        run: |
          mkdir -p /tmp/digests/${{ matrix.image.name }}
          DIGEST="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${{ matrix.image.name }}/${DIGEST#sha256:}"

      - name: Compute platform slug
        id: slug
        run: echo "slug=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: dhi-digest-${{ matrix.image.name }}-${{ steps.slug.outputs.slug }}
          path: /tmp/digests/${{ matrix.image.name }}
          if-no-files-found: error
          retention-days: 1

  # -------------------------------------------------------------------
  #  Merge DHI manifests + tag + sign + attest
  # -------------------------------------------------------------------
  merge-dhi:
    name: Merge DHI – ${{ matrix.image.name }}
    needs: [build-dhi, check-dhi]
    if: needs.build-dhi.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: clamav-hardened
            version_key: clamav
          - name: squid-hardened
            version_key: squid
          - name: c-icap-hardened
            version_key: c-icap
    steps:
      - uses: actions/checkout@v4

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests/${{ matrix.image.name }}
          pattern: dhi-digest-${{ matrix.image.name }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read upstream version
        id: upstream
        run: |
          VERSION=$(jq -r '."${{ matrix.image.version_key }}"' versions.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create manifest list and push
        id: manifest
        run: |
          set -euo pipefail
          VERSION="${{ steps.upstream.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}"

          # Build tag flags
          TAGS="-t ${IMAGE}:${VERSION} -t ${IMAGE}:latest"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            GIT_VERSION="${GITHUB_REF_NAME#v}"
            TAGS="${TAGS} -t ${IMAGE}:${GIT_VERSION}"
          fi

          # Collect digests from artifacts
          SOURCES=""
          for f in /tmp/digests/${{ matrix.image.name }}/*; do
            SOURCES="${SOURCES} ${IMAGE}@sha256:$(basename "$f")"
          done

          # Create and push multi-arch manifest
          docker buildx imagetools create ${TAGS} ${SOURCES}

          # Get the manifest list digest
          DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" --format '{{json .Manifest}}' | jq -r '.digest')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign manifest (OIDC keyless)
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}"
          cosign sign --yes "${IMAGE}@${{ steps.manifest.outputs.digest }}"

      - name: Detect scan platform
        id: scan-platform
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}"
          VERSION="${{ steps.upstream.outputs.version }}"
          # Prefer amd64 (runner-native), fall back to first available
          PLATFORM=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" \
            --format '{{range .Manifest.Manifests}}{{if eq .Platform.Architecture "amd64"}}linux/amd64{{end}}{{end}}')
          if [ -z "$PLATFORM" ]; then
            PLATFORM=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" \
              --format '{{with index .Manifest.Manifests 0}}{{.Platform.OS}}/{{.Platform.Architecture}}{{end}}')
          fi
          echo "platform=${PLATFORM}" >> "$GITHUB_OUTPUT"

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_PLATFORM: ${{ steps.scan-platform.outputs.platform }}
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}@${{ steps.manifest.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.image.name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: dhi-${{ matrix.image.name }}

      - name: GitHub SLSA Attestation
        if: "!startsWith(github.ref, 'refs/heads/dependabot/')"
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

      - name: Summary
        run: |
          echo "### ${{ matrix.image.name }} (v${{ steps.upstream.outputs.version }})" >> $GITHUB_STEP_SUMMARY
          echo "**Manifest digest :** \`${{ steps.manifest.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}:${{ steps.upstream.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # -------------------------------------------------------------------
  #  Build + Push Dockerfiles → ghcr.io (per-platform, push by digest)
  #  Fallback when DHI unavailable
  # -------------------------------------------------------------------
  build-dockerfile:
    name: Build – ${{ matrix.image.name }} (${{ matrix.platform }})
    needs: [check-dhi, compute-platforms]
    runs-on: ubuntu-latest
    # Runs on main push or tags when DHI secrets are NOT available (fallback)
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && needs.check-dhi.outputs.has-dhi == 'false'
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: clamav-hardened
            dockerfile: clamav/Dockerfile
            context: clamav/
            prep-target: builder
            version_key: clamav
          - name: squid-hardened
            dockerfile: squid/Dockerfile
            context: squid/
            prep-target: prep
            version_key: squid
          - name: c-icap-hardened
            dockerfile: c-icap/Dockerfile
            context: c-icap/
            prep-target: prep
            version_key: c-icap
        platform: ${{ fromJson(needs.compute-platforms.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.platform != 'linux/amd64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login Docker Hub
        if: env.HAS_DOCKERHUB == 'true'
        uses: docker/login-action@v4
        env:
          HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Scan the Alpine prep stage (amd64 only – can't --load cross-arch)
      - name: Build prep stage (Alpine with runtime deps)
        if: matrix.platform == 'linux/amd64'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          target: ${{ matrix.image.prep-target }}
          platforms: linux/amd64
          load: true
          tags: ${{ matrix.image.name }}-prep:scan
          cache-from: type=gha,scope=${{ matrix.image.name }}-prep

      - name: Trivy scan prep stage (Alpine CVEs)
        if: matrix.platform == 'linux/amd64'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image.name }}-prep:scan
          format: sarif
          output: trivy-${{ matrix.image.name }}-deps.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload prep SARIF
        if: matrix.platform == 'linux/amd64'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image.name }}-deps.sarif
          category: ${{ matrix.image.name }}-deps

      - name: Build & Push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.platform }}
          sbom: true
          provenance: mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          outputs: type=image,"name=${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests/${{ matrix.image.name }}
          DIGEST="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${{ matrix.image.name }}/${DIGEST#sha256:}"

      - name: Compute platform slug
        id: slug
        run: echo "slug=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image.name }}-${{ steps.slug.outputs.slug }}
          path: /tmp/digests/${{ matrix.image.name }}
          if-no-files-found: error
          retention-days: 1

  # -------------------------------------------------------------------
  #  Merge Dockerfile manifests + tag + sign + scan + attest
  # -------------------------------------------------------------------
  merge-dockerfile:
    name: Merge – ${{ matrix.image.name }}
    needs: [build-dockerfile, check-dhi]
    if: needs.build-dockerfile.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: clamav-hardened
            version_key: clamav
          - name: squid-hardened
            version_key: squid
          - name: c-icap-hardened
            version_key: c-icap
    steps:
      - uses: actions/checkout@v4

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests/${{ matrix.image.name }}
          pattern: digest-${{ matrix.image.name }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login Docker Hub
        if: env.HAS_DOCKERHUB == 'true'
        uses: docker/login-action@v4
        env:
          HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Read upstream version
        id: upstream
        run: |
          VERSION=$(jq -r '."${{ matrix.image.version_key }}"' versions.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create manifest list and push
        id: manifest
        env:
          HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_TOKEN != '' }}
          DOCKERHUB_NS: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.upstream.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}"

          # Build tag flags
          TAGS="-t ${IMAGE}:${VERSION} -t ${IMAGE}:latest"
          if [ "$HAS_DOCKERHUB" = "true" ]; then
            TAGS="${TAGS} -t docker.io/${DOCKERHUB_NS}/${{ matrix.image.name }}:${VERSION}"
            TAGS="${TAGS} -t docker.io/${DOCKERHUB_NS}/${{ matrix.image.name }}:latest"
          fi
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            GIT_VERSION="${GITHUB_REF_NAME#v}"
            TAGS="${TAGS} -t ${IMAGE}:${GIT_VERSION}"
          fi

          # Collect digests from artifacts
          SOURCES=""
          for f in /tmp/digests/${{ matrix.image.name }}/*; do
            SOURCES="${SOURCES} ${IMAGE}@sha256:$(basename "$f")"
          done

          # Create and push multi-arch manifest
          docker buildx imagetools create ${TAGS} ${SOURCES}

          # Get the manifest list digest
          DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" --format '{{json .Manifest}}' | jq -r '.digest')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign manifest (OIDC keyless)
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}"
          cosign sign --yes "${IMAGE}@${{ steps.manifest.outputs.digest }}"

      - name: Detect scan platform
        id: scan-platform
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}"
          VERSION="${{ steps.upstream.outputs.version }}"
          # Prefer amd64 (runner-native), fall back to first available
          PLATFORM=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" \
            --format '{{range .Manifest.Manifests}}{{if eq .Platform.Architecture "amd64"}}linux/amd64{{end}}{{end}}')
          if [ -z "$PLATFORM" ]; then
            PLATFORM=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" \
              --format '{{with index .Manifest.Manifests 0}}{{.Platform.OS}}/{{.Platform.Architecture}}{{end}}')
          fi
          echo "platform=${PLATFORM}" >> "$GITHUB_OUTPUT"

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_PLATFORM: ${{ steps.scan-platform.outputs.platform }}
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}@${{ steps.manifest.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.image.name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: ${{ matrix.image.name }}

      - name: GitHub SLSA Attestation
        if: "!startsWith(github.ref, 'refs/heads/dependabot/')"
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

      - name: Summary
        env:
          HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_TOKEN != '' }}
          DOCKERHUB_NS: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          echo "### ${{ matrix.image.name }} (v${{ steps.upstream.outputs.version }})" >> $GITHUB_STEP_SUMMARY
          echo "**Manifest digest :** \`${{ steps.manifest.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          PLATFORMS=$(docker buildx imagetools inspect "${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}:${{ steps.upstream.outputs.version }}" \
            --format '{{range .Manifest.Manifests}}{{.Platform.OS}}/{{.Platform.Architecture}} {{end}}' 2>/dev/null || echo "unknown")
          echo "**Platforms :** ${PLATFORMS}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}:latest" >> $GITHUB_STEP_SUMMARY
          if [ "$HAS_DOCKERHUB" = "true" ]; then
            echo "docker pull docker.io/${DOCKERHUB_NS}/${{ matrix.image.name }}:latest" >> $GITHUB_STEP_SUMMARY
          fi
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # -------------------------------------------------------------------
  #  Release sur tag v*.*.* : tarball + checksums
  # -------------------------------------------------------------------
  release:
    name: GitHub Release
    needs: [merge-dhi, merge-dockerfile]
    # Run if either merge job succeeded (the other is skipped based on DHI secrets)
    if: always() && startsWith(github.ref, 'refs/tags/v') && (needs.merge-dhi.result == 'success' || needs.merge-dockerfile.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Tarball + checksums
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          tar --exclude='.git' --exclude='dist' --exclude='certs/bump.*' \
              --exclude='certs/dhparam*' --exclude='.env' \
              -czf "dist/squid-stack-${VERSION}.tar.gz" \
              --transform "s,^,squid-stack-${VERSION}/," \
              $(ls -A | grep -v -E '^(\.git|dist)$')
          cd dist
          sha256sum "squid-stack-${VERSION}.tar.gz" > "squid-stack-${VERSION}.sha256"
          sha512sum "squid-stack-${VERSION}.tar.gz" > "squid-stack-${VERSION}.sha512"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/squid-stack-${{ github.ref_name }}.tar.gz
            dist/squid-stack-${{ github.ref_name }}.sha256
            dist/squid-stack-${{ github.ref_name }}.sha512
