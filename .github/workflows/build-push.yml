# =====================================================================
#  Build & Push – deux stratégies selon le contexte :
#
#  1) build-dhi   → Docker Hardened Images (YAML) → ghcr.io (registry)
#       Utilise dhi.io/build:2-alpine3.23 comme frontend BuildKit.
#       Nécessite : DOCKER_USERNAME + DOCKER_TOKEN (secrets GitHub)
#       pour docker login dhi.io.
#
#  2) build-dockerfile → Dockerfiles multi-stage classiques
#       Fallback si DHI indisponible ou pour validation en PR.
#       Pas besoin de docker login dhi.io.
#
#  Architecture multi-arch :
#    - Chaque plateforme (amd64, arm64) est un job séparé en parallèle
#    - Les digests sont uploadés en artifacts
#    - Un job merge crée le manifest multi-arch + signe + scanne
# =====================================================================
name: build-push

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
    paths:
      - 'squid/**'
      - 'c-icap/**'
      - 'clamav/**'
      - 'versions.json'
      - '.github/workflows/build-push.yml'
  pull_request:
    branches: [main]
    paths:
      - 'squid/**'
      - 'c-icap/**'
      - 'clamav/**'
      - 'versions.json'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Target platforms'
        required: false
        default: 'linux/amd64'
        type: choice
        options:
          - 'linux/amd64'
          - 'linux/arm64'
          - 'linux/amd64,linux/arm64'

env:
  REGISTRY: ghcr.io
  NAMESPACE: ${{ github.repository_owner }}

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write
  attestations: write

jobs:
  # -------------------------------------------------------------------
  #  Lint (Hadolint + ShellCheck) – toujours, y compris en PR
  # -------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Hadolint – squid/Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: squid/Dockerfile
          failure-threshold: warning

      - name: Hadolint – c-icap/Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: c-icap/Dockerfile
          failure-threshold: warning

      - name: Hadolint – clamav/Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: clamav/Dockerfile
          failure-threshold: warning

      - name: ShellCheck – scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts

  # -------------------------------------------------------------------
  #  Functional test: build the 3 images locally (plain Dockerfile, not
  #  DHI) and exercise the real squid -> c-icap -> clamav ICAP chain with
  #  an EICAR download, gating both publish paths below.
  # -------------------------------------------------------------------
  test:
    name: Functional tests (EICAR)
    needs: lint
    runs-on: ubuntu-latest
    env:
      # true on a real push/tag to this repo (never on pull_request -- fork
      # PRs must never get registry push credentials); gates every
      # push-by-digest / login / digest-export step below. On a PR, images
      # are still built and functionally tested via `load: true`, just
      # never pushed anywhere.
      PUBLISH: ${{ github.event_name != 'pull_request' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate SSL-bump CA (required by squid-explicit.conf)
        run: ./scripts/generate-ca.sh

      - name: Login ghcr.io
        if: env.PUBLISH == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Scan each image's Alpine runtime-deps stage (moved here from
      # build-dockerfile since amd64 -- the only platform these can --load
      # -- is now always built in this job, never there; runs on every PR
      # too, not just push). clamav has no separate "prep" stage -- its
      # builder stage doubles as the runtime-deps assembly, matching
      # build-dockerfile's original per-image prep-target mapping.
      - name: Build prep stage (Alpine with runtime deps) - clamav-hardened
        uses: docker/build-push-action@v7
        with:
          context: clamav/
          file: clamav/Dockerfile
          target: builder
          platforms: linux/amd64
          load: true
          tags: clamav-hardened-prep:scan
          cache-from: type=gha,scope=clamav-hardened-prep

      - name: Trivy scan prep stage (Alpine CVEs) - clamav-hardened
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: clamav-hardened-prep:scan
          format: sarif
          output: trivy-clamav-hardened-deps.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload prep SARIF - clamav-hardened
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-clamav-hardened-deps.sarif
          category: clamav-hardened-deps

      - name: Build prep stage (Alpine with runtime deps) - c-icap-hardened
        uses: docker/build-push-action@v7
        with:
          context: c-icap/
          file: c-icap/Dockerfile
          target: prep
          platforms: linux/amd64
          load: true
          tags: c-icap-hardened-prep:scan
          cache-from: type=gha,scope=c-icap-hardened-prep

      - name: Trivy scan prep stage (Alpine CVEs) - c-icap-hardened
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: c-icap-hardened-prep:scan
          format: sarif
          output: trivy-c-icap-hardened-deps.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload prep SARIF - c-icap-hardened
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-c-icap-hardened-deps.sarif
          category: c-icap-hardened-deps

      - name: Build prep stage (Alpine with runtime deps) - squid-hardened
        uses: docker/build-push-action@v7
        with:
          context: squid/
          file: squid/Dockerfile
          target: prep
          platforms: linux/amd64
          load: true
          tags: squid-hardened-prep:scan
          cache-from: type=gha,scope=squid-hardened-prep

      - name: Trivy scan prep stage (Alpine CVEs) - squid-hardened
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: squid-hardened-prep:scan
          format: sarif
          output: trivy-squid-hardened-deps.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload prep SARIF - squid-hardened
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-squid-hardened-deps.sarif
          category: squid-hardened-deps

      # squid and c-icap compile from source (~9-10 min for squid alone).
      # Two prior attempts at sharing build-dockerfile's `type=gha` cache
      # through `docker compose build`/`buildx bake` (docker-compose.ci.yml
      # override, then COMPOSE_BAKE=true) both wrote valid cache entries but
      # never actually got a hit from build-dockerfile's cache -- no
      # measurable speedup either time, most likely a cache-key mismatch
      # between compose/bake's build invocation and build-push-action's.
      # Using the exact same action build-dockerfile uses, with the exact
      # same cache scope, sidesteps that entirely: same tool, same key
      # derivation, guaranteed-compatible cache.
      #
      # On a real push/tag (PUBLISH=true), each image is pushed by digest
      # (not loaded) and then pulled back BY THAT EXACT DIGEST for the
      # functional test below -- not "an image that should be identical
      # thanks to cache", the literal bytes now sitting in the registry. If
      # that digest passes, build-dockerfile/merge-dockerfile reuse it
      # as-is for the published manifest; nothing gets rebuilt between "we
      # tested this" and "this is what ships". On a PR there's nothing to
      # promote yet, so `load: true` is enough to validate the code.
      - name: Build clamav-hardened
        id: build-clamav
        uses: docker/build-push-action@v7
        with:
          context: clamav/
          file: clamav/Dockerfile
          platforms: linux/amd64
          load: ${{ env.PUBLISH != 'true' }}
          outputs: ${{ env.PUBLISH == 'true' && format('type=image,name={0}/{1}/clamav-hardened,push-by-digest=true,name-canonical=true,push=true', env.REGISTRY, env.NAMESPACE) || '' }}
          sbom: ${{ env.PUBLISH }}
          provenance: ${{ env.PUBLISH == 'true' && 'mode=max' || 'false' }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: docker.io/jbsky/clamav-hardened:latest
          cache-from: type=gha,scope=clamav-hardened-linux/amd64
          cache-to: type=gha,mode=max,scope=clamav-hardened-linux/amd64

      - name: Build c-icap-hardened
        id: build-cicap
        uses: docker/build-push-action@v7
        with:
          context: c-icap/
          file: c-icap/Dockerfile
          platforms: linux/amd64
          load: ${{ env.PUBLISH != 'true' }}
          outputs: ${{ env.PUBLISH == 'true' && format('type=image,name={0}/{1}/c-icap-hardened,push-by-digest=true,name-canonical=true,push=true', env.REGISTRY, env.NAMESPACE) || '' }}
          sbom: ${{ env.PUBLISH }}
          provenance: ${{ env.PUBLISH == 'true' && 'mode=max' || 'false' }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: docker.io/jbsky/c-icap-hardened:latest
          cache-from: type=gha,scope=c-icap-hardened-linux/amd64
          cache-to: type=gha,mode=max,scope=c-icap-hardened-linux/amd64

      - name: Build squid-hardened
        id: build-squid
        uses: docker/build-push-action@v7
        with:
          context: squid/
          file: squid/Dockerfile
          platforms: linux/amd64
          load: ${{ env.PUBLISH != 'true' }}
          outputs: ${{ env.PUBLISH == 'true' && format('type=image,name={0}/{1}/squid-hardened,push-by-digest=true,name-canonical=true,push=true', env.REGISTRY, env.NAMESPACE) || '' }}
          sbom: ${{ env.PUBLISH }}
          provenance: ${{ env.PUBLISH == 'true' && 'mode=max' || 'false' }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: docker.io/jbsky/squid-hardened:latest
          cache-from: type=gha,scope=squid-hardened-linux/amd64
          cache-to: type=gha,mode=max,scope=squid-hardened-linux/amd64

      # Pull back the exact digest just pushed, under the tag docker-compose
      # expects -- guarantees what gets tested below is byte-for-byte what's
      # now in the registry, not a separately-loaded local build.
      - name: Pull back pushed digests for testing
        if: env.PUBLISH == 'true'
        run: |
          set -euo pipefail
          docker pull "${{ env.REGISTRY }}/${{ env.NAMESPACE }}/clamav-hardened@${{ steps.build-clamav.outputs.digest }}"
          docker tag  "${{ env.REGISTRY }}/${{ env.NAMESPACE }}/clamav-hardened@${{ steps.build-clamav.outputs.digest }}" docker.io/jbsky/clamav-hardened:latest
          docker pull "${{ env.REGISTRY }}/${{ env.NAMESPACE }}/c-icap-hardened@${{ steps.build-cicap.outputs.digest }}"
          docker tag  "${{ env.REGISTRY }}/${{ env.NAMESPACE }}/c-icap-hardened@${{ steps.build-cicap.outputs.digest }}" docker.io/jbsky/c-icap-hardened:latest
          docker pull "${{ env.REGISTRY }}/${{ env.NAMESPACE }}/squid-hardened@${{ steps.build-squid.outputs.digest }}"
          docker tag  "${{ env.REGISTRY }}/${{ env.NAMESPACE }}/squid-hardened@${{ steps.build-squid.outputs.digest }}" docker.io/jbsky/squid-hardened:latest

      - name: Start stack (images already built/pulled above)
        run: docker compose --profile explicit up -d --no-build

      - name: Wait for clamav + c-icap + squid-explicit healthy
        run: |
          set -euo pipefail
          # clamav's first boot blocks on a real freshclam sync against
          # database.clamav.net before clamd even starts -- typically well
          # under a minute, but generous here since it's third-party network.
          for i in $(seq 1 60); do
            all_healthy=true
            line=""
            for c in clamav c-icap squid-explicit; do
              status=$(docker inspect --format '{{.State.Health.Status}}' "$c" 2>&1) || status="inspect-failed: $status"
              line="$line $c=$status"
              [ "$status" = "healthy" ] || all_healthy=false
            done
            echo "[$((i*10))s]$line"
            [ "$all_healthy" = "true" ] && exit 0
            sleep 10
          done
          echo "::error::stack did not become healthy in time"
          for c in clamav c-icap squid-explicit; do
            echo "-- $c: OOMKilled=$(docker inspect --format '{{.State.OOMKilled}}' "$c" 2>&1), ExitCode=$(docker inspect --format '{{.State.ExitCode}}' "$c" 2>&1), RestartCount=$(docker inspect --format '{{.RestartCount}}' "$c" 2>&1), Error=$(docker inspect --format '{{.State.Error}}' "$c" 2>&1)"
          done
          docker compose ps -a
          docker compose logs
          exit 1

      - name: EICAR test (squid -> c-icap -> clamav)
        run: ./scripts/test-eicar.sh

      - name: Container logs (on failure)
        if: failure()
        run: docker compose logs

      - name: Teardown
        if: always()
        run: docker compose --profile explicit down -v

      # Only reached if the EICAR test above passed. Exports the exact
      # digests just tested so build-dockerfile/merge-dockerfile can reuse
      # them directly for amd64 instead of building again -- same naming
      # convention (digest-<image>-<platform-slug>) build-dockerfile's own
      # "Export digest"/"Upload digest" steps use, so merge-dockerfile's
      # existing `pattern: digest-<image>-*` download picks these up too.
      - name: Export tested digests (amd64)
        id: export-digests
        if: env.PUBLISH == 'true'
        run: |
          set -euo pipefail
          declare -A digests=(
            [clamav-hardened]="${{ steps.build-clamav.outputs.digest }}"
            [c-icap-hardened]="${{ steps.build-cicap.outputs.digest }}"
            [squid-hardened]="${{ steps.build-squid.outputs.digest }}"
          )
          for name in "${!digests[@]}"; do
            mkdir -p "/tmp/digests/${name}"
            touch "/tmp/digests/${name}/${digests[$name]#sha256:}"
          done

      - name: Upload tested digests (clamav-hardened, linux/amd64)
        if: env.PUBLISH == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: digest-clamav-hardened-linux-amd64
          path: /tmp/digests/clamav-hardened
          if-no-files-found: error
          retention-days: 1

      - name: Upload tested digests (c-icap-hardened, linux/amd64)
        if: env.PUBLISH == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: digest-c-icap-hardened-linux-amd64
          path: /tmp/digests/c-icap-hardened
          if-no-files-found: error
          retention-days: 1

      - name: Upload tested digests (squid-hardened, linux/amd64)
        if: env.PUBLISH == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: digest-squid-hardened-linux-amd64
          path: /tmp/digests/squid-hardened
          if-no-files-found: error
          retention-days: 1

  # -------------------------------------------------------------------
  #  Check if DHI credentials are configured
  # -------------------------------------------------------------------
  check-dhi:
    name: Check DHI credentials
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      has-dhi: ${{ steps.check.outputs.has-dhi }}
    steps:
      - id: check
        env:
          DHI_USER: ${{ secrets.DOCKER_USERNAME }}
        run: |
          if [ -n "$DHI_USER" ]; then
            echo "has-dhi=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-dhi=false" >> "$GITHUB_OUTPUT"
          fi

  # -------------------------------------------------------------------
  #  Compute platform matrix from workflow input
  # -------------------------------------------------------------------
  compute-platforms:
    name: Compute platforms
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      matrix-secondary: ${{ steps.set.outputs.matrix-secondary }}
    steps:
      - id: set
        run: |
          PLATFORMS="${{ inputs.platforms || 'linux/amd64' }}"
          # Convert comma-separated string to JSON array
          MATRIX=$(echo "$PLATFORMS" | jq -Rc 'split(",")')
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          # amd64 is always built, pushed by digest, and functionally tested
          # directly in the `test` job now (guarantees the exact tested
          # digest is what ships, not a separately-rebuilt one) --
          # build-dockerfile only needs to build whatever ELSE was
          # requested (e.g. arm64 on a manual multi-platform dispatch). On
          # a plain push (amd64 only) this resolves to an empty array,
          # which skips build-dockerfile's matrix entirely.
          SECONDARY=$(echo "$MATRIX" | jq -c '[.[] | select(. != "linux/amd64")]')
          echo "matrix-secondary=${SECONDARY}" >> "$GITHUB_OUTPUT"

  # -------------------------------------------------------------------
  #  Validation YAML DHI (parse-check avant le vrai build)
  #  Skipped if DHI credentials are not configured
  # -------------------------------------------------------------------
  validate-dhi:
    name: Validate DHI YAML
    runs-on: ubuntu-latest
    needs: check-dhi
    if: needs.check-dhi.outputs.has-dhi == 'true'
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Login dhi.io pour que BuildKit puisse pull le frontend DHI
      - name: Login dhi.io (frontend DHI)
        uses: docker/login-action@v4
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # On lance un build --load sans push pour valider la syntaxe YAML DHI
      # sur une seule plateforme pour aller vite
      - name: Validate clamav.yaml
        run: |
          docker buildx build clamav/ -f clamav/clamav.yaml \
            --platform linux/amd64 \
            --sbom=generator=dhi.io/scout-sbom-indexer:1 \
            --provenance=1 \
            --tag dhi-validate-clamav:ci \
            --load

      - name: Validate squid.yaml
        run: |
          docker buildx build squid/ -f squid/squid.yaml \
            --platform linux/amd64 \
            --sbom=generator=dhi.io/scout-sbom-indexer:1 \
            --provenance=1 \
            --tag dhi-validate-squid:ci \
            --load

      - name: Validate c-icap.yaml
        run: |
          docker buildx build c-icap/ -f c-icap/c-icap.yaml \
            --platform linux/amd64 \
            --sbom=generator=dhi.io/scout-sbom-indexer:1 \
            --provenance=1 \
            --tag dhi-validate-cicap:ci \
            --load

  # -------------------------------------------------------------------
  #  Build + Push DHI → ghcr.io (per-platform, push by digest)
  #  Skipped if DHI credentials are not configured
  # -------------------------------------------------------------------
  build-dhi:
    name: DHI – ${{ matrix.image.name }} (${{ matrix.platform }})
    needs: [check-dhi, validate-dhi, compute-platforms, test]
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && needs.check-dhi.outputs.has-dhi == 'true'
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: clamav-hardened
            definition: clamav/clamav.yaml
            context: clamav/
            version_key: clamav
          - name: squid-hardened
            definition: squid/squid.yaml
            context: squid/
            version_key: squid
          - name: c-icap-hardened
            definition: c-icap/c-icap.yaml
            context: c-icap/
            version_key: c-icap
        platform: ${{ fromJson(needs.compute-platforms.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        if: matrix.platform != 'linux/amd64'
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Login dhi.io (frontend DHI)
        uses: docker/login-action@v4
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Login ghcr.io (registry cible)
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push by digest (DHI)
        id: build
        run: |
          docker buildx build ${{ matrix.image.context }} \
            -f ${{ matrix.image.definition }} \
            --platform ${{ matrix.platform }} \
            --sbom=generator=dhi.io/scout-sbom-indexer:1 \
            --provenance=mode=max \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --output "type=image,name=${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }},push-by-digest=true,name-canonical=true,push=true" \
            --cache-from type=gha,scope=${{ matrix.image.name }}-${{ matrix.platform }} \
            --cache-to   type=gha,mode=max,scope=${{ matrix.image.name }}-${{ matrix.platform }} \
            --metadata-file /tmp/meta.json

          DIGEST=$(jq -r '."containerimage.digest"' /tmp/meta.json)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Export digest
        run: |
          mkdir -p /tmp/digests/${{ matrix.image.name }}
          DIGEST="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${{ matrix.image.name }}/${DIGEST#sha256:}"

      - name: Compute platform slug
        id: slug
        run: echo "slug=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: dhi-digest-${{ matrix.image.name }}-${{ steps.slug.outputs.slug }}
          path: /tmp/digests/${{ matrix.image.name }}
          if-no-files-found: error
          retention-days: 1

  # -------------------------------------------------------------------
  #  Merge DHI manifests + tag + sign + attest
  # -------------------------------------------------------------------
  merge-dhi:
    name: Merge DHI – ${{ matrix.image.name }}
    needs: [build-dhi, check-dhi]
    if: needs.build-dhi.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: clamav-hardened
            version_key: clamav
          - name: squid-hardened
            version_key: squid
          - name: c-icap-hardened
            version_key: c-icap
    steps:
      - uses: actions/checkout@v7

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests/${{ matrix.image.name }}
          pattern: dhi-digest-${{ matrix.image.name }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read upstream version
        id: upstream
        run: |
          VERSION=$(jq -r '."${{ matrix.image.version_key }}"' versions.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create manifest list and push
        id: manifest
        run: |
          set -euo pipefail
          VERSION="${{ steps.upstream.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}"

          # Build tag flags
          TAGS="-t ${IMAGE}:${VERSION} -t ${IMAGE}:latest"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            GIT_VERSION="${GITHUB_REF_NAME#v}"
            TAGS="${TAGS} -t ${IMAGE}:${GIT_VERSION}"
          fi

          # Collect digests from artifacts
          SOURCES=""
          for f in /tmp/digests/${{ matrix.image.name }}/*; do
            SOURCES="${SOURCES} ${IMAGE}@sha256:$(basename "$f")"
          done

          # Create and push multi-arch manifest
          docker buildx imagetools create ${TAGS} ${SOURCES}

          # Get the manifest list digest
          DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" --format '{{json .Manifest}}' | jq -r '.digest')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign manifest (OIDC keyless)
        env:
          HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_TOKEN != '' }}
          DOCKERHUB_NS: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}"
          cosign sign --yes "${IMAGE}@${{ steps.manifest.outputs.digest }}"
          if [ "$HAS_DOCKERHUB" = "true" ]; then
            COSIGN_REPOSITORY="${IMAGE}" \
              cosign sign --yes "docker.io/${DOCKERHUB_NS}/${{ matrix.image.name }}@${{ steps.manifest.outputs.digest }}"
          fi

      - name: Detect scan platform
        id: scan-platform
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}"
          VERSION="${{ steps.upstream.outputs.version }}"
          # Prefer amd64 (runner-native), fall back to first available
          PLATFORM=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" \
            --format '{{range .Manifest.Manifests}}{{if eq .Platform.Architecture "amd64"}}linux/amd64{{end}}{{end}}')
          if [ -z "$PLATFORM" ]; then
            PLATFORM=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" \
              --format '{{with index .Manifest.Manifests 0}}{{.Platform.OS}}/{{.Platform.Architecture}}{{end}}')
          fi
          echo "platform=${PLATFORM}" >> "$GITHUB_OUTPUT"

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_PLATFORM: ${{ steps.scan-platform.outputs.platform }}
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}@${{ steps.manifest.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.image.name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: dhi-${{ matrix.image.name }}

      - name: GitHub SLSA Attestation
        if: "!startsWith(github.ref, 'refs/heads/dependabot/')"
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

      - name: Summary
        run: |
          echo "### ${{ matrix.image.name }} (v${{ steps.upstream.outputs.version }})" >> $GITHUB_STEP_SUMMARY
          echo "**Manifest digest :** \`${{ steps.manifest.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}:${{ steps.upstream.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # -------------------------------------------------------------------
  #  Build + Push Dockerfiles → ghcr.io (per-platform, push by digest)
  #  Fallback when DHI unavailable
  # -------------------------------------------------------------------
  build-dockerfile:
    name: Build – ${{ matrix.image.name }} (${{ matrix.platform }})
    needs: [check-dhi, compute-platforms, test]
    runs-on: ubuntu-latest
    # Runs on main push or tags when DHI secrets are NOT available (fallback)
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && needs.check-dhi.outputs.has-dhi == 'false'
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: clamav-hardened
            dockerfile: clamav/Dockerfile
            context: clamav/
            version_key: clamav
          - name: squid-hardened
            dockerfile: squid/Dockerfile
            context: squid/
            version_key: squid
          - name: c-icap-hardened
            dockerfile: c-icap/Dockerfile
            context: c-icap/
            version_key: c-icap
        platform: ${{ fromJson(needs.compute-platforms.outputs.matrix-secondary) }}

    steps:
      - uses: actions/checkout@v7

      # matrix-secondary never includes linux/amd64 (that platform is built,
      # pushed by digest, and functionally tested directly in the `test`
      # job) -- QEMU is unconditional here since this job now only ever
      # builds other platforms (arm64 on a manual multi-platform dispatch).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login Docker Hub
        if: env.HAS_DOCKERHUB == 'true'
        uses: docker/login-action@v4
        env:
          HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.platform }}
          sbom: true
          provenance: mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          outputs: type=image,"name=${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests/${{ matrix.image.name }}
          DIGEST="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${{ matrix.image.name }}/${DIGEST#sha256:}"

      - name: Compute platform slug
        id: slug
        run: echo "slug=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.image.name }}-${{ steps.slug.outputs.slug }}
          path: /tmp/digests/${{ matrix.image.name }}
          if-no-files-found: error
          retention-days: 1

  # -------------------------------------------------------------------
  #  Merge Dockerfile manifests + tag + sign + scan + attest
  # -------------------------------------------------------------------
  merge-dockerfile:
    name: Merge – ${{ matrix.image.name }}
    needs: [test, build-dockerfile, check-dhi]
    # build-dockerfile is "skipped" (not "success") for two different
    # reasons now: has-dhi==true (DHI path active instead -- must NOT merge
    # here, explicitly excluded below) or has-dhi==false with nothing left
    # in matrix-secondary (the common case: only amd64 was requested, and
    # that digest already came from `test` itself -- must still merge).
    # The explicit ref check is required now too: `test` runs (and passes)
    # on every PR as well, and on a PR build-dockerfile is ALSO "skipped"
    # (its own ref check fails) -- previously that "skipped" alone was
    # enough to keep this job off PRs, since only 'success' was accepted.
    # Accepting 'skipped' for the common amd64-only case reopened that gap.
    if: >-
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) &&
      needs.check-dhi.outputs.has-dhi == 'false' && needs.test.result == 'success' &&
      (needs.build-dockerfile.result == 'success' || needs.build-dockerfile.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: clamav-hardened
            version_key: clamav
          - name: squid-hardened
            version_key: squid
          - name: c-icap-hardened
            version_key: c-icap
    steps:
      - uses: actions/checkout@v7

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests/${{ matrix.image.name }}
          pattern: digest-${{ matrix.image.name }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login Docker Hub
        if: env.HAS_DOCKERHUB == 'true'
        uses: docker/login-action@v4
        env:
          HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Read upstream version
        id: upstream
        run: |
          VERSION=$(jq -r '."${{ matrix.image.version_key }}"' versions.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create manifest list and push
        id: manifest
        env:
          HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_TOKEN != '' }}
          DOCKERHUB_NS: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.upstream.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}"

          # Build tag flags
          TAGS="-t ${IMAGE}:${VERSION} -t ${IMAGE}:latest"
          if [ "$HAS_DOCKERHUB" = "true" ]; then
            TAGS="${TAGS} -t docker.io/${DOCKERHUB_NS}/${{ matrix.image.name }}:${VERSION}"
            TAGS="${TAGS} -t docker.io/${DOCKERHUB_NS}/${{ matrix.image.name }}:latest"
          fi
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            GIT_VERSION="${GITHUB_REF_NAME#v}"
            TAGS="${TAGS} -t ${IMAGE}:${GIT_VERSION}"
          fi

          # Collect digests from artifacts
          SOURCES=""
          for f in /tmp/digests/${{ matrix.image.name }}/*; do
            SOURCES="${SOURCES} ${IMAGE}@sha256:$(basename "$f")"
          done

          # Create and push multi-arch manifest
          docker buildx imagetools create ${TAGS} ${SOURCES}

          # Get the manifest list digest
          DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" --format '{{json .Manifest}}' | jq -r '.digest')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign manifest (OIDC keyless)
        env:
          HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_TOKEN != '' }}
          DOCKERHUB_NS: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}"
          cosign sign --yes "${IMAGE}@${{ steps.manifest.outputs.digest }}"
          if [ "$HAS_DOCKERHUB" = "true" ]; then
            COSIGN_REPOSITORY="${IMAGE}" \
              cosign sign --yes "docker.io/${DOCKERHUB_NS}/${{ matrix.image.name }}@${{ steps.manifest.outputs.digest }}"
          fi

      - name: Detect scan platform
        id: scan-platform
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}"
          VERSION="${{ steps.upstream.outputs.version }}"
          # Prefer amd64 (runner-native), fall back to first available
          PLATFORM=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" \
            --format '{{range .Manifest.Manifests}}{{if eq .Platform.Architecture "amd64"}}linux/amd64{{end}}{{end}}')
          if [ -z "$PLATFORM" ]; then
            PLATFORM=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" \
              --format '{{with index .Manifest.Manifests 0}}{{.Platform.OS}}/{{.Platform.Architecture}}{{end}}')
          fi
          echo "platform=${PLATFORM}" >> "$GITHUB_OUTPUT"

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_PLATFORM: ${{ steps.scan-platform.outputs.platform }}
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}@${{ steps.manifest.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.image.name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: ${{ matrix.image.name }}

      - name: GitHub SLSA Attestation
        if: "!startsWith(github.ref, 'refs/heads/dependabot/')"
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

      - name: Summary
        env:
          HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_TOKEN != '' }}
          DOCKERHUB_NS: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          echo "### ${{ matrix.image.name }} (v${{ steps.upstream.outputs.version }})" >> $GITHUB_STEP_SUMMARY
          echo "**Manifest digest :** \`${{ steps.manifest.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          PLATFORMS=$(docker buildx imagetools inspect "${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}:${{ steps.upstream.outputs.version }}" \
            --format '{{range .Manifest.Manifests}}{{.Platform.OS}}/{{.Platform.Architecture}} {{end}}' 2>/dev/null || echo "unknown")
          echo "**Platforms :** ${PLATFORMS}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}:latest" >> $GITHUB_STEP_SUMMARY
          if [ "$HAS_DOCKERHUB" = "true" ]; then
            echo "docker pull docker.io/${DOCKERHUB_NS}/${{ matrix.image.name }}:latest" >> $GITHUB_STEP_SUMMARY
          fi
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # -------------------------------------------------------------------
  cleanup:
    name: Prune old registry tags
    needs: merge-dockerfile
    uses: ./.github/workflows/registry-cleanup.yml
    secrets: inherit

  # -------------------------------------------------------------------
  #  Release sur tag v*.*.* : tarball + checksums
  # -------------------------------------------------------------------
  release:
    name: GitHub Release
    needs: [merge-dhi, merge-dockerfile]
    # Run if either merge job succeeded (the other is skipped based on DHI secrets)
    if: always() && startsWith(github.ref, 'refs/tags/v') && (needs.merge-dhi.result == 'success' || needs.merge-dockerfile.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Tarball + checksums
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          tar --exclude='.git' --exclude='dist' --exclude='certs/bump.*' \
              --exclude='certs/dhparam*' --exclude='.env' \
              -czf "dist/squid-stack-${VERSION}.tar.gz" \
              --transform "s,^,squid-stack-${VERSION}/," \
              $(ls -A | grep -v -E '^(\.git|dist)$')
          cd dist
          sha256sum "squid-stack-${VERSION}.tar.gz" > "squid-stack-${VERSION}.sha256"
          sha512sum "squid-stack-${VERSION}.tar.gz" > "squid-stack-${VERSION}.sha512"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/squid-stack-${{ github.ref_name }}.tar.gz
            dist/squid-stack-${{ github.ref_name }}.sha256
            dist/squid-stack-${{ github.ref_name }}.sha512
