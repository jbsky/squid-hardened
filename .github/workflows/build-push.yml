# =====================================================================
#  Build & Push – deux stratégies selon le contexte :
#
#  1) build-dhi   → Docker Hardened Images (YAML) → ghcr.io (registry)
#       Utilise dhi.io/build:2-alpine3.23 comme frontend BuildKit.
#       Nécessite : DOCKER_USERNAME + DOCKER_TOKEN (secrets GitHub)
#       pour docker login dhi.io.
#
#  2) build-dockerfile → Dockerfiles multi-stage classiques
#       Fallback si DHI indisponible ou pour validation en PR.
#       Pas besoin de docker login dhi.io.
#
#  La CI pousse UNIQUEMENT les images DHI (build-dhi) sur ghcr.io.
#  Les Dockerfiles servent à la validation de syntaxe et aux tests locaux.
# =====================================================================
name: build-push

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
    paths:
      - 'squid/**'
      - 'c-icap/**'
      - 'clamav/**'
      - '.github/workflows/build-push.yml'
  pull_request:
    branches: [main]
    paths:
      - 'squid/**'
      - 'c-icap/**'
      - 'clamav/**'
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  NAMESPACE: ${{ github.repository_owner }}

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write
  attestations: write

jobs:
  # -------------------------------------------------------------------
  #  Lint (Hadolint + ShellCheck) – toujours, y compris en PR
  # -------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hadolint – squid/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: squid/Dockerfile
          failure-threshold: warning

      - name: Hadolint – c-icap/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: c-icap/Dockerfile
          failure-threshold: warning

      - name: Hadolint – clamav/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: clamav/Dockerfile
          failure-threshold: warning

      - name: ShellCheck – scripts + entrypoints
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          additional_files: 'squid/entrypoint.sh c-icap/entrypoint.sh clamav/entrypoint.sh'

  # -------------------------------------------------------------------
  #  Check if DHI credentials are configured
  # -------------------------------------------------------------------
  check-dhi:
    name: Check DHI credentials
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      has-dhi: ${{ steps.check.outputs.has-dhi }}
    steps:
      - id: check
        env:
          DHI_USER: ${{ secrets.DOCKER_USERNAME }}
        run: |
          if [ -n "$DHI_USER" ]; then
            echo "has-dhi=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-dhi=false" >> "$GITHUB_OUTPUT"
          fi

  # -------------------------------------------------------------------
  #  Validation YAML DHI (parse-check avant le vrai build)
  #  Skipped if DHI credentials are not configured
  # -------------------------------------------------------------------
  validate-dhi:
    name: Validate DHI YAML
    runs-on: ubuntu-latest
    needs: check-dhi
    if: needs.check-dhi.outputs.has-dhi == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login dhi.io pour que BuildKit puisse pull le frontend DHI
      - name: Login dhi.io (frontend DHI)
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # On lance un build --load sans push pour valider la syntaxe YAML DHI
      # sur une seule plateforme pour aller vite
      - name: Validate clamav.yaml
        run: |
          docker buildx build clamav/ -f clamav/clamav.yaml \
            --platform linux/amd64 \
            --sbom=generator=dhi.io/scout-sbom-indexer:1 \
            --provenance=1 \
            --tag dhi-validate-clamav:ci \
            --load

      - name: Validate squid.yaml
        run: |
          docker buildx build squid/ -f squid/squid.yaml \
            --platform linux/amd64 \
            --sbom=generator=dhi.io/scout-sbom-indexer:1 \
            --provenance=1 \
            --tag dhi-validate-squid:ci \
            --load

      - name: Validate c-icap.yaml
        run: |
          docker buildx build c-icap/ -f c-icap/c-icap.yaml \
            --platform linux/amd64 \
            --sbom=generator=dhi.io/scout-sbom-indexer:1 \
            --provenance=1 \
            --tag dhi-validate-cicap:ci \
            --load

  # -------------------------------------------------------------------
  #  Build + Push DHI → ghcr.io (multi-arch, signé, SBOM attaché)
  #  Skipped if DHI credentials are not configured
  # -------------------------------------------------------------------
  build-dhi:
    name: DHI – ${{ matrix.image.name }}
    needs: [check-dhi, validate-dhi]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && needs.check-dhi.outputs.has-dhi == 'true'
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: clamav-hardened
            definition: clamav/clamav.yaml
            context: clamav/
          - name: squid-hardened
            definition: squid/squid.yaml
            context: squid/
          - name: c-icap-hardened
            definition: c-icap/c-icap.yaml
            context: c-icap/

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      # 1) Login dhi.io – requis pour que BuildKit pull le frontend DHI
      #    (# syntax=dhi.io/build:2-alpine3.23 en tête du YAML)
      - name: Login dhi.io (frontend DHI)
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 2) Login ghcr.io – pour push de l'image produite
      - name: Login ghcr.io (registry cible)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags + labels OCI)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=schedule,pattern=nightly
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # 3) Build DHI multi-arch + push
      #    --sbom=generator=dhi.io/scout-sbom-indexer:1  → SBOM DHI natif
      #    --provenance=mode=max                          → SLSA level 3
      - name: Build & Push (DHI multi-arch)
        id: build
        run: |
          docker buildx build ${{ matrix.image.context }} \
            -f ${{ matrix.image.definition }} \
            --platform linux/amd64,linux/arm64 \
            --sbom=generator=dhi.io/scout-sbom-indexer:1 \
            --provenance=mode=max \
            $(echo "${{ steps.meta.outputs.tags }}" | sed 's/^/--tag /') \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --cache-from type=gha,scope=${{ matrix.image.name }} \
            --cache-to   type=gha,mode=max,scope=${{ matrix.image.name }} \
            --push \
            --metadata-file /tmp/meta-${{ matrix.image.name }}.json

          # Extraction du digest pour la signature
          DIGEST=$(jq -r '."containerimage.digest"' /tmp/meta-${{ matrix.image.name }}.json)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      # 4) Vérification cosign (l'image DHI est déjà signée par dhi.io)
      #    On y ajoute une 2e signature keyless propre au repo CI
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Co-signature OIDC keyless (repo GitHub)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}"
          for tag in $(echo "${{ steps.meta.outputs.tags }}"); do
            cosign sign --yes "${tag}@${DIGEST}"
          done

      # 5) Scan Trivy + upload SARIF
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.image.name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: dhi-${{ matrix.image.name }}

      # 6) Attestation SLSA GitHub (Build Provenance)
      - name: GitHub SLSA Attestation
        if: "!startsWith(github.ref, 'refs/heads/dependabot/')"
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Summary
        run: |
          echo "### ${{ matrix.image.name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Digest :** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "# Pull" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Vérifier signature" >> $GITHUB_STEP_SUMMARY
          echo "cosign verify ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}@${{ steps.build.outputs.digest }} \\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-identity-regexp '^https://github.com/${{ github.repository }}/' \\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # -------------------------------------------------------------------
  #  Build + Push Dockerfiles → ghcr.io (fallback when DHI unavailable)
  # -------------------------------------------------------------------
  build-dockerfile:
    name: Build – ${{ matrix.image.name }}
    needs: check-dhi
    runs-on: ubuntu-latest
    # Only runs on push (not PR) and when DHI secrets are NOT available
    if: github.event_name != 'pull_request' && needs.check-dhi.outputs.has-dhi == 'false'
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: clamav-hardened
            dockerfile: clamav/Dockerfile
            context: clamav/
          - name: squid-hardened
            dockerfile: squid/Dockerfile
            context: squid/
          - name: c-icap-hardened
            dockerfile: c-icap/Dockerfile
            context: c-icap/

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags + labels OCI)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=schedule,pattern=nightly

      - name: Build & Push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (OIDC keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}"
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.image.name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: ${{ matrix.image.name }}

      - name: GitHub SLSA Attestation
        if: "!startsWith(github.ref, 'refs/heads/dependabot/')"
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Summary
        run: |
          echo "### ${{ matrix.image.name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Digest :** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image.name }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # -------------------------------------------------------------------
  #  Release sur tag v*.*.* : tarball + checksums
  # -------------------------------------------------------------------
  release:
    name: GitHub Release
    needs: [build-dhi, build-dockerfile]
    # Run if either build job succeeded (the other is skipped based on DHI secrets)
    if: always() && startsWith(github.ref, 'refs/tags/v') && (needs.build-dhi.result == 'success' || needs.build-dockerfile.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Tarball + checksums
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          tar --exclude='.git' --exclude='dist' --exclude='certs/bump.*' \
              --exclude='certs/dhparam*' --exclude='.env' \
              -czf "dist/squid-stack-${VERSION}.tar.gz" \
              --transform "s,^,squid-stack-${VERSION}/," \
              $(ls -A | grep -v -E '^(\.git|dist)$')
          cd dist
          sha256sum "squid-stack-${VERSION}.tar.gz" > "squid-stack-${VERSION}.sha256"
          sha512sum "squid-stack-${VERSION}.tar.gz" > "squid-stack-${VERSION}.sha512"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/squid-stack-${{ github.ref_name }}.tar.gz
            dist/squid-stack-${{ github.ref_name }}.sha256
            dist/squid-stack-${{ github.ref_name }}.sha512
